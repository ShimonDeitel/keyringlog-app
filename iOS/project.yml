name: KeyRingLog
options:
  bundleIdPrefix: com.shimondeitel.keyringlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  KeyRingLog:
    type: application
    platform: iOS
    sources:
      - path: KeyRingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.keyringlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: KeyRingLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KeyRingLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KeyRingLogTests
      - path: KeyRingLog.storekit
    dependencies:
      - target: KeyRingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.keyringlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KeyRingLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KeyRingLogUITests
    dependencies:
      - target: KeyRingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.keyringlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  KeyRingLog:
    build:
      targets:
        KeyRingLog: all
        KeyRingLogTests: [test]
        KeyRingLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: KeyRingLog.storekit
    test:
      config: Debug
      storeKitConfiguration: KeyRingLog.storekit
      targets:
        - KeyRingLogTests
        - KeyRingLogUITests
    archive:
      config: Release
